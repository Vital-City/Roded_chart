<div style="max-width: 1100px; margin: 0 auto;">
<svg width="100%" viewBox="0 0 1100 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The informal economy in four numbers: 750,000 informal workers, 40 billion dollars in off-the-books output per year, 19,000 vendor applications backlogged, 30 percent of small construction done off-permit." style="font-family: 'halyard-text', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: block;">

  <rect x="0" y="0" width="1100" height="480" fill="#ffffff"/>

  <!-- Kicker -->
  <text x="50" y="55" font-size="13" font-weight="700" fill="#ff7c53" letter-spacing="3">NEW YORK CITY</text>

  <!-- Title -->
  <text x="50" y="95" font-size="32" font-weight="700" fill="#111111">The informal economy, in four numbers</text>

  <!-- Subtitle -->
  <text x="50" y="130" font-size="16" font-weight="400" fill="#555555">Order-of-magnitude estimates of the work, output and permitting that happen off the books</text>

  <!-- Chartreuse accent rule -->
  <rect x="50" y="160" width="64" height="3" fill="#d7e814"/>

  <!-- Top divider line -->
  <line x1="125" y1="161" x2="1050" y2="161" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Vertical dividers between stats -->
  <line x1="290" y1="220" x2="290" y2="380" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="580" y1="220" x2="580" y2="380" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="850" y1="220" x2="850" y2="380" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ===== STAT 1: ~750K Informal workers ===== -->
  <text x="155" y="295" font-size="84" font-weight="700" fill="#ff7c53" text-anchor="middle">~750K</text>
  <text x="155" y="345" font-size="16" font-weight="700" fill="#111111" text-anchor="middle">Informal workers</text>
  <text x="155" y="370" font-size="14" font-weight="400" fill="#777777" text-anchor="middle">in New York City</text>

  <!-- ===== STAT 2: ~$40B Output ===== -->
  <text x="435" y="295" font-size="84" font-weight="700" fill="#ff7c53" text-anchor="middle">~$40B</text>
  <text x="435" y="345" font-size="16" font-weight="700" fill="#111111" text-anchor="middle">Off-the-books output</text>
  <text x="435" y="370" font-size="14" font-weight="400" fill="#777777" text-anchor="middle">per year</text>

  <!-- ===== STAT 3: ~19K Vendor applications ===== -->
  <text x="715" y="295" font-size="84" font-weight="700" fill="#ff7c53" text-anchor="middle">~19K</text>
  <text x="715" y="345" font-size="16" font-weight="700" fill="#111111" text-anchor="middle">Vendor applications</text>
  <text x="715" y="370" font-size="14" font-weight="400" fill="#777777" text-anchor="middle">backlogged</text>

  <!-- ===== STAT 4: ~30% Small construction ===== -->
  <text x="970" y="295" font-size="84" font-weight="700" fill="#ff7c53" text-anchor="middle">~30%</text>
  <text x="970" y="345" font-size="16" font-weight="700" fill="#111111" text-anchor="middle">Small construction</text>
  <text x="970" y="370" font-size="14" font-weight="400" fill="#777777" text-anchor="middle">done off-permit</text>

  <!-- Bottom divider -->
  <line x1="50" y1="415" x2="1050" y2="415" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Source line -->
  <text x="50" y="437" font-size="11" font-weight="400" fill="#555555">Source: NYC Comptroller; Fiscal Policy Institute; NYC DCWP.</text>
  <text x="50" y="455" font-size="11" font-weight="400" fill="#888888">Figures are approximations meant to convey scale, not precision.</text>

  <!-- Vital City wordmark -->
  <text x="1050" y="445" font-size="14" font-weight="700" fill="#111111" text-anchor="end" letter-spacing="3">VITAL CITY</text>

</svg>
</div>
